name: Madcap
options:
  bundleIdPrefix: com.sfegette
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  Madcap:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Capture
      - path: Controllers
      - path: Views
      - path: Models
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sfegette.madcap
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Madcap.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
